<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonderm — Вход</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 16px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      .subtitle { margin: 0 0 20px; color: #94a3b8; font-size: 14px; }
      .row { margin-bottom: 14px; }
      label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
      .hint { font-size: 12px; color: #64748b; margin-top: 4px; font-weight: 400; }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
      }
      input.invalid { border-color: #ef4444; }
      input.valid { border-color: #22c55e; }
      .pw-wrap { display: flex; gap: 8px; align-items: stretch; }
      .pw-wrap input { flex: 1; }
      .pw-toggle {
        flex: 0 0 auto;
        width: 44px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #1e293b;
        color: #94a3b8;
        cursor: pointer;
        font-size: 18px;
      }
      button.main {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
        background: #2563eb;
      }
      button.main:disabled { opacity: 0.6; cursor: not-allowed; }
      .switch {
        margin-top: 16px;
        text-align: center;
        color: #94a3b8;
        font-size: 14px;
      }
      .switch a { color: #60a5fa; text-decoration: none; }
      .msg {
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        display: none;
        font-size: 14px;
      }
      .error { background: #3a1111; color: #fecaca; }
      .ok { background: #052e16; color: #bbf7d0; }
      .hidden { display: none !important; }
      .username-status { font-size: 13px; margin-top: 6px; min-height: 1.2em; }
      .username-status.ok { color: #4ade80; }
      .username-status.bad { color: #f87171; }
      .username-status.wait { color: #94a3b8; }
      .strength-bar {
        height: 4px;
        border-radius: 2px;
        background: #334155;
        margin-top: 8px;
        overflow: hidden;
      }
      .strength-fill { height: 100%; width: 0%; transition: width 0.2s, background 0.2s; }
      .strength-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sonderm</h1>
      <p class="subtitle" id="modeSubtitle">Вход в аккаунт</p>

      <div id="errorBox" class="msg error"></div>
      <div id="okBox" class="msg ok"></div>

      <form id="authForm">
        <div id="blockLogin">
          <div class="row">
            <label for="loginId">Имя пользователя или email</label>
            <input id="loginId" type="text" autocomplete="username" placeholder="@username или you@mail.com" required />
          </div>
          <div class="row">
            <label for="loginPassword">Пароль</label>
            <div class="pw-wrap">
              <input id="loginPassword" type="password" autocomplete="current-password" required />
              <button type="button" class="pw-toggle" id="toggleLoginPw" title="Показать пароль">👁</button>
            </div>
          </div>
        </div>

        <div id="blockRegister" class="hidden">
          <div class="row">
            <label for="displayName">Имя</label>
            <input id="displayName" type="text" placeholder="Например: Абду" maxlength="80" />
            <p class="hint">Видимое имя, может повторяться у разных людей.</p>
          </div>
          <div class="row">
            <label for="regUsername">Имя пользователя (уникальное)</label>
            <input
              id="regUsername"
              type="text"
              placeholder="только латиница, цифры, _"
              autocomplete="off"
              spellcheck="false"
            />
            <p class="hint">3–32 символа: a–z, 0–9, подчёркивание. Заполняется автоматически из имени.</p>
            <div id="usernameStatus" class="username-status wait"></div>
          </div>
          <div class="row">
            <label for="regPassword">Пароль</label>
            <div class="pw-wrap">
              <input id="regPassword" type="password" autocomplete="new-password" minlength="6" />
              <button type="button" class="pw-toggle" id="toggleRegPw" title="Показать пароль">👁</button>
            </div>
            <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
            <div id="strengthLabel" class="strength-label">Сложность пароля</div>
          </div>
          <div class="row">
            <label for="regPassword2">Подтвердите пароль</label>
            <input id="regPassword2" type="password" autocomplete="new-password" minlength="6" />
          </div>
          <div class="row">
            <label for="recoveryEmail">Email (необязательно)</label>
            <input id="recoveryEmail" type="email" autocomplete="email" placeholder="Для входа и восстановления" />
            <p class="hint">Если не указать — для входа используйте имя пользователя.</p>
          </div>
        </div>

        <button class="main" id="submitBtn" type="submit">Войти</button>
      </form>

      <div class="switch">
        <span id="switchText">Нет аккаунта?</span>
        <a href="#" id="switchLink">Зарегистрироваться</a>
      </div>
    </main>

    <script src="/auth-client.js"></script>
    <script>
      (function () {
        const CYR = {
          а: "a", б: "b", в: "v", г: "g", д: "d", е: "e", ё: "e", ж: "zh", з: "z", и: "i", й: "y",
          к: "k", л: "l", м: "m", н: "n", о: "o", п: "p", р: "r", с: "s", т: "t", у: "u", ф: "f",
          х: "h", ц: "ts", ч: "ch", ш: "sh", щ: "sch", ъ: "", ы: "y", ь: "", э: "e", ю: "yu", я: "ya",
        };

        function translitToUsernameBase(str) {
          let out = "";
          for (const ch of String(str || "").toLowerCase()) {
            if (/[a-z0-9_]/.test(ch)) out += ch;
            else if (CYR[ch]) out += CYR[ch];
          }
          return out.replace(/_+/g, "_").replace(/^_|_$/g, "");
        }

        function suggestUsername(displayName) {
          let base = translitToUsernameBase(displayName);
          if (!base) base = "user";
          return base.slice(0, 32);
        }

        function normalizeUsername(raw) {
          return String(raw || "")
            .trim()
            .replace(/^@/, "")
            .toLowerCase()
            .replace(/[^a-z0-9_]/g, "");
        }

        function passwordStrength(pw) {
          let score = 0;
          if (pw.length >= 6) score += 1;
          if (pw.length >= 10) score += 1;
          if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) score += 1;
          if (/\d/.test(pw)) score += 1;
          if (/[^a-zA-Z0-9]/.test(pw)) score += 1;
          return Math.min(score, 4);
        }

        function updateStrength() {
          const pw = $("regPassword").value;
          const s = passwordStrength(pw);
          const fill = $("strengthFill");
          const label = $("strengthLabel");
          const pct = [0, 25, 50, 75, 100][s];
          const colors = ["#64748b", "#ef4444", "#f97316", "#eab308", "#22c55e"];
          const texts = ["Слишком короткий", "Слабый", "Нормальный", "Хороший", "Сильный"];
          fill.style.width = pw ? pct + "%" : "0%";
          fill.style.background = colors[s];
          label.textContent = pw ? texts[s] : "Сложность пароля";
        }

        function $(id) {
          return document.getElementById(id);
        }

        const form = $("authForm");
        const submitBtn = $("submitBtn");
        const switchText = $("switchText");
        const switchLink = $("switchLink");
        const errorBox = $("errorBox");
        const okBox = $("okBox");
        const blockLogin = $("blockLogin");
        const blockRegister = $("blockRegister");
        const modeSubtitle = $("modeSubtitle");

        let isLoginMode = true;
        let usernameTouched = false;
        let checkTimer = null;
        let lastUsernameCheck = null;

        function hideMessages() {
          errorBox.style.display = "none";
          okBox.style.display = "none";
        }

        function showError(message) {
          errorBox.textContent = message;
          errorBox.style.display = "block";
          okBox.style.display = "none";
        }

        function showSuccess(message) {
          okBox.textContent = message;
          okBox.style.display = "block";
          errorBox.style.display = "none";
        }

        function updateModeUi() {
          blockLogin.classList.toggle("hidden", !isLoginMode);
          blockRegister.classList.toggle("hidden", isLoginMode);
          submitBtn.textContent = isLoginMode ? "Войти" : "Зарегистрироваться";
          switchText.textContent = isLoginMode ? "Нет аккаунта?" : "Уже есть аккаунт?";
          switchLink.textContent = isLoginMode ? "Зарегистрироваться" : "Войти";
          modeSubtitle.textContent = isLoginMode ? "Вход в аккаунт" : "Новый аккаунт";
          $("loginId").required = isLoginMode;
          $("loginPassword").required = isLoginMode;
          $("displayName").required = !isLoginMode;
          $("regUsername").required = !isLoginMode;
          $("regPassword").required = !isLoginMode;
          $("regPassword2").required = !isLoginMode;
        }

        function bindPwToggle(inputId, btnId) {
          $(btnId).addEventListener("click", () => {
            const inp = $(inputId);
            inp.type = inp.type === "password" ? "text" : "password";
          });
        }

        bindPwToggle("loginPassword", "toggleLoginPw");
        bindPwToggle("regPassword", "toggleRegPw");

        $("displayName").addEventListener("input", () => {
          if (usernameTouched) return;
          const sug = suggestUsername($("displayName").value);
          if (sug) {
            $("regUsername").value = sug;
            scheduleUsernameCheck();
          }
        });

        $("regUsername").addEventListener("input", () => {
          usernameTouched = true;
          $("regUsername").value = normalizeUsername($("regUsername").value);
          scheduleUsernameCheck();
        });

        $("regPassword").addEventListener("input", updateStrength);

        function scheduleUsernameCheck() {
          const status = $("usernameStatus");
          const un = normalizeUsername($("regUsername").value);
          clearTimeout(checkTimer);
          $("regUsername").classList.remove("valid", "invalid");
          if (!un) {
            status.textContent = "";
            status.className = "username-status wait";
            return;
          }
          if (un.length < 3 || un.length > 32) {
            status.textContent = "Длина 3–32 символа";
            status.className = "username-status bad";
            return;
          }
          status.textContent = "Проверка…";
          status.className = "username-status wait";
          checkTimer = setTimeout(() => checkUsernameRemote(un), 500);
        }

        async function checkUsernameRemote(un, updateUi = true) {
          const status = $("usernameStatus");
          try {
            const r = await fetch(`${window.location.origin}/api/auth/check-username`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username: un }),
            });
            const j = await r.json();
            lastUsernameCheck = j;
            if (!updateUi) return j;
            if (!j.available && j.reason === "format") {
              status.textContent = "Только латиница, цифры и _";
              status.className = "username-status bad";
              $("regUsername").classList.add("invalid");
              return j;
            }
            if (j.available) {
              status.textContent = "✓ Имя свободно";
              status.className = "username-status ok";
              $("regUsername").classList.add("valid");
            } else {
              status.textContent = "✗ Имя уже занято";
              status.className = "username-status bad";
              $("regUsername").classList.add("invalid");
            }
            return j;
          } catch (e) {
            if (updateUi) {
              status.textContent = "Не удалось проверить (нужен запущенный сервер)";
              status.className = "username-status bad";
            }
            return { available: false, reason: "network" };
          }
        }

        switchLink.addEventListener("click", (e) => {
          e.preventDefault();
          isLoginMode = !isLoginMode;
          if (!isLoginMode) {
            usernameTouched = false;
            $("usernameStatus").textContent = "";
            $("usernameStatus").className = "username-status wait";
            const dn = $("displayName").value.trim();
            if (dn) $("regUsername").value = suggestUsername(dn);
          }
          hideMessages();
          updateModeUi();
          updateStrength();
        });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          hideMessages();
          submitBtn.disabled = true;

          try {
            if (isLoginMode) {
              const id = $("loginId").value.trim();
              const password = $("loginPassword").value;
              const { error } = await window.authClient.signIn(id, password);
              if (error) throw error;
              showSuccess("Вход выполнен…");
              setTimeout(() => {
                window.location.href = "/index.html";
              }, 600);
            } else {
              const displayName = $("displayName").value.trim();
              const username = normalizeUsername($("regUsername").value);
              const p1 = $("regPassword").value;
              const p2 = $("regPassword2").value;
              const recoveryEmail = $("recoveryEmail").value.trim();

              if (!displayName) throw new Error("Введите имя.");
              if (username.length < 3) throw new Error("Имя пользователя слишком короткое.");
              if (p1.length < 6) throw new Error("Пароль не короче 6 символов.");
              if (p1 !== p2) throw new Error("Пароли не совпадают.");
              if (lastUsernameCheck && !lastUsernameCheck.available) {
                throw new Error("Выберите другое имя пользователя.");
              }

              if (recoveryEmail) {
                const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(recoveryEmail);
                if (!ok) throw new Error("Некорректный email.");
              }

              const chk = await checkUsernameRemote(username, false);
              if (!chk.available) {
                throw new Error(
                  chk.reason === "network"
                    ? "Сервер недоступен для проверки имени. Запустите backend и откройте сайт с того же адреса."
                    : "Имя пользователя занято или некорректно."
                );
              }

              const { data, error } = await window.authClient.signUp({
                displayName,
                username,
                password: p1,
                recoveryEmail: recoveryEmail || undefined,
              });
              if (error) throw error;

              if (data?.user && !data.session) {
                showSuccess("Проверьте почту для подтверждения (если включено в Supabase), затем войдите.");
              } else {
                showSuccess("Аккаунт создан. Входим…");
                setTimeout(() => {
                  window.location.href = "/index.html";
                }, 800);
              }
              isLoginMode = true;
              updateModeUi();
              $("regPassword").value = "";
              $("regPassword2").value = "";
            }
          } catch (err) {
            const msg =
              err.message ||
              (typeof err === "string" ? err : "Ошибка авторизации.");
            if (/fetch|network|failed/i.test(msg)) {
              showError(
                "Не удалось связаться с сервером или Supabase. Откройте сайт через URL сервера (не file://), проверьте ключ anon в Dashboard (нужен JWT eyJ…), в Supabase → Auth → URL добавьте ваш домен."
              );
            } else {
              showError(msg);
            }
          } finally {
            submitBtn.disabled = false;
          }
        });

        async function boot() {
          const { data, error } = await window.authClient.getSession();
          if (error) {
            showError(error.message);
            return;
          }
          if (data.session) {
            window.location.href = "/index.html";
          }
        }

        updateModeUi();
        boot();
      })();
    </script>
  </body>
</html>
