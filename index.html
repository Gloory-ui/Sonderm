<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonderm</title>
    <link rel="stylesheet" href="/telegram.css">
</head>
<body>
    <div id="app" class="app">
        <!-- Левая панель -->
        <aside class="chats-panel" id="chatsPanel">
            <!-- Хедер -->
            <header class="header">
                <button class="icon-btn" id="menuBtn">☰</button>
                <div class="header-title">
                    <div id="headerTitle">Чаты</div>
                    <div class="header-subtitle" id="headerSubtitle"></div>
                </div>
                <button class="icon-btn" id="newChatBtn">✏️</button>
            </header>

            <!-- Навигация -->
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="chats">Чаты</button>
                <button class="nav-tab" data-tab="contacts">Контакты</button>
                <button class="nav-tab" data-tab="settings">Настройки</button>
                <button class="nav-tab" data-tab="profile">Профиль</button>
            </nav>

            <!-- Экран чатов -->
            <div class="screen active" id="chatsScreen">
                <div class="search-container">
                    <input type="text" class="search-input" id="chatSearch" placeholder="Поиск">
                </div>
                <div class="chat-list" id="chatList">
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <div class="empty-text">Нет чатов</div>
                        <div class="empty-subtext">Начните общение с контактов</div>
                    </div>
                </div>
            </div>

            <!-- Экран контактов -->
            <div class="screen" id="contactsScreen">
                <div class="search-container">
                    <input type="text" class="search-input" id="contactSearch" placeholder="Поиск пользователей">
                </div>
                <div class="chat-list" id="contactList">
                    <div class="empty-state">
                        <div class="empty-icon">👥</div>
                        <div class="empty-text">Поиск пользователей...</div>
                        <div class="empty-subtext">Введите имя пользователя для поиска</div>
                    </div>
                </div>
            </div>

            <!-- Экран настроек -->
            <div class="screen" id="settingsScreen">
                <div class="list-item" id="logoutBtn">
                    <span>🚪 Выйти из аккаунта</span>
                </div>
                <div class="list-item">
                    <span>🔔 Уведомления</span>
                </div>
                <div class="list-item">
                    <span>🔒 Конфиденциальность</span>
                </div>
            </div>

            <!-- Экран профиля -->
            <div class="screen" id="profileScreen">
                <div class="profile-form">
                    <div class="form-group">
                        <label class="form-label">Отображаемое имя</label>
                        <input type="text" class="form-input" id="displayName" placeholder="Ваше имя">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-input" id="username" placeholder="@username">
                    </div>
                    <button class="btn-primary" id="saveProfileBtn">Сохранить</button>
                </div>
            </div>
        </aside>

        <!-- Правая панель - чат -->
        <main class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">←</button>
                <div class="avatar" id="chatAvatar">?</div>
                <div class="header-title">
                    <div id="chatName">Выберите чат</div>
                    <div class="header-subtitle" id="chatStatus"></div>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <div class="empty-text">Выберите чат</div>
                    <div class="empty-subtext">Начните общение</div>
                </div>
            </div>

            <div class="compose">
                <textarea class="compose-input" id="messageInput" placeholder="Напишите сообщение..." rows="1"></textarea>
                <div class="compose-actions">
                    <button class="action-btn" id="attachBtn">📎</button>
                    <button class="action-btn" id="emojiBtn">😊</button>
                    <button class="action-btn send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Скрытые элементы -->
    <input type="file" id="fileInput" style="display: none;">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="/auth-client.js"></script>
    <script src="/app-new.js"></script>
</body>
</html>
